name: NuGet - Generate Pack Matrix
description: Discover packable csproj files and emit a build matrix

inputs:
  projects_glob:
    description: Glob for projects (can be multiline)
    required: true
  exclude_globs:
    description: Glob(s) to exclude (can be multiline)
    required: true

outputs:
  matrix:
    description: JSON matrix for strategy
    value: ${{ steps.gen.outputs.matrix }}

runs:
  using: composite
  steps:
    - id: gen
      shell: bash
      env:
        PROJECTS_GLOB: ${{ inputs.projects_glob }}
        EXCLUDE_GLOB: ${{ inputs.exclude_globs }}
      run: |
        set -euo pipefail
        shopt -s globstar nullglob extglob

        # Ensure jq is installed
        if ! command -v jq >/dev/null 2>&1; then
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          else
            echo "jq is required but not installed and apt-get is not available" >&2
            exit 1
          fi
        fi

        # Read multiline globs into Bash arrays safely
        mapfile -t in_globs <<< "$PROJECTS_GLOB"
        mapfile -t ex_globs <<< "$EXCLUDE_GLOB"

        include=()

        # Get all tracked .csproj files once
        mapfile -t all_csproj < <(git ls-files '*.csproj' || true)

        for f in "${all_csproj[@]}"; do

          echo "Found File $f"
          
          # 1. Check if the file matches our INCLUDE globs
          is_included=false
          for ig in "${in_globs[@]}"; do
            # Strip whitespace/carriage returns
            ig=$(echo "$ig" | tr -d '\r' | xargs)
            [[ -z "$ig" ]] && continue

            # Bash pattern match (no quotes around $ig)
            if [[ $f == $ig ]]; then
              is_included=true
              echo "Inclued File $f"
              break
            fi
          done

          # If it didn't match any include glob, skip it
          [[ "$is_included" == "false" ]] && continue

          # 2. Check if the file matches our EXCLUDE globs
          is_excluded=false
          for eg in "${ex_globs[@]}"; do
            eg=$(echo "$eg" | tr -d '\r' | xargs)
            [[ -z "$eg" ]] && continue

            # Bash pattern match (no quotes around $eg)
            if [[ $f == $eg ]]; then
              is_excluded=true
              echo "exclued File $f"
              break
            fi
          done

          # If it matched an exclude glob, skip it
          [[ "$is_excluded" == "true" ]] && continue

          # 3. Check for IsPackable false
          if grep -Eqi '<IsPackable>\s*false\s*</IsPackable>' "$f"; then
            continue
          fi

          # 4. If we made it here, add it to our include list
          include+=( "$f" )
        done

        # Build JSON output using jq
        if (( ${#include[@]} == 0 )); then
          json='{"include":[]}'
        else
          json=$(jq -c -n --argjson arr "$(printf '%s\n' "${include[@]}" | jq -R . | jq -s .)" '
            { include:
                ( $arr
                  | map({
                      project: .,
                      project_dir: ( . | sub("/[^/]+$"; "") )
                    })
                )
            }')
        fi

        # Escape for GitHub Actions output
        json_escaped=${json//'%'/'%25'}
        json_escaped=${json_escaped//$'\n'/'%0A'}
        json_escaped=${json_escaped//$'\r'/'%0D'}

  
        echo "matrix=$json_escaped" >> "$GITHUB_OUTPUT"

    - name: Matrix generated
      shell: bash
      run: echo "Matrix generated."
